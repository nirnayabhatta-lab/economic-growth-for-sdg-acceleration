name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  data-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rebuild seed data
        run: python3 scripts/build_seed_data.py
      - name: Validate data contracts
        run: python3 scripts/validate_data.py
